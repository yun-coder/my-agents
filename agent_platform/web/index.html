<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Platform - AI 知识库助手</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:900px;display:flex;flex-direction:column;height:100vh}
header{padding:16px 20px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:600;color:#f8fafc}
.badge{font-size:11px;padding:3px 10px;border-radius:12px;background:#1e3a5f;color:#60a5fa}
.status{font-size:11px;display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e}
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.message{max-width:85%;padding:12px 16px;border-radius:12px;line-height:1.6;font-size:14px}
.message.user{align-self:flex-end;background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.message.assistant{align-self:flex-start;background:#1e293b;color:#e2e8f0;border-bottom-left-radius:4px}
.message .sources{margin-top:8px;font-size:11px;color:#94a3b8;border-top:1px solid #334155;padding-top:6px}
.message .tool-log{margin-top:6px;font-size:11px;color:#fbbf24}
.thinking{align-self:flex-start;color:#64748b;font-size:13px;padding:4px 12px}
.input-bar{padding:12px 20px;border-top:1px solid #1e293b;display:flex;gap:10px}
.input-bar input{flex:1;padding:10px 16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:14px;outline:none}
.input-bar input:focus{border-color:#2563eb}
.input-bar button{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500}
.input-bar button:hover{opacity:.85}
.input-bar button:disabled{opacity:.5;cursor:not-allowed}
.btn-rag{background:#2563eb;color:#fff}
.btn-agent{background:#7c3aed;color:#fff}
.mode-tabs{display:flex;gap:4px;padding:8px 20px 0}
.mode-tab{padding:6px 14px;border-radius:6px 6px 0 0;border:1px solid transparent;background:transparent;color:#94a3b8;font-size:13px;cursor:pointer}
.mode-tab.active{background:#1e293b;color:#f8fafc;border-color:#334155;border-bottom-color:#1e293b}
.empty-state{text-align:center;color:#475569;margin-top:80px}
.empty-state h2{font-size:20px;margin-bottom:8px;color:#64748b}
.empty-state p{font-size:14px}
.upload-zone{margin:8px 20px;border:2px dashed #334155;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.dragover{border-color:#2563eb;background:#1e293b}
.upload-zone p{font-size:13px;color:#94a3b8;margin:4px 0}
.upload-zone .icon{font-size:24px;margin-bottom:4px}
.upload-zone .hint{font-size:11px;color:#475569;margin-top:6px}
.upload-toast{padding:10px 16px;margin:8px 20px;border-radius:8px;font-size:13px;display:none}
.upload-toast.success{display:block;background:#064e3b;color:#6ee7b7;border:1px solid #065f46}
.upload-toast.error{display:block;background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.upload-toast.loading{display:block;background:#1e3a5f;color:#93c5fd;border:1px solid #1e40af}
.pipeline{max-width:88%;align-self:flex-start;border:1px solid #1e293b;border-radius:10px;overflow:hidden;background:#0f172a}
.pipeline-header{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:12px;color:#94a3b8;user-select:none}
.pipeline-header:hover{color:#e2e8f0}
.pipeline-header .arrow{display:inline-block;transition:transform .2s;font-size:10px}
.pipeline-header.open .arrow{transform:rotate(90deg)}
.pipeline-body{display:none}
.pipeline-body.show{display:block;max-height:320px;overflow-y:auto;padding:0 14px 10px}
.pipeline-steps{display:flex;align-items:flex-start;gap:6px;padding-bottom:8px}
.pipeline-step{flex:1;min-width:100px;background:#1e293b;border-radius:6px;padding:8px;text-align:center}
.pipeline-step .step-icon{font-size:16px;margin-bottom:2px}
.pipeline-step .step-title{font-size:10px;color:#64748b;margin-bottom:2px}
.pipeline-step .step-value{font-size:12px;color:#e2e8f0;font-weight:600}
.pipeline-step .step-sub{font-size:9px;color:#475569;margin-top:1px}
.pipeline-arrow{display:flex;align-items:center;color:#334155;font-size:14px;padding-top:10px;flex-shrink:0}
.chunk-list{margin-top:8px;max-height:180px;overflow-y:auto}
.chunk-item{background:#1e293b;border-radius:6px;padding:6px 8px;margin-bottom:4px;font-size:11px}
.chunk-item .chunk-idx{color:#60a5fa;font-size:9px;margin-bottom:1px}
.chunk-item .chunk-text{color:#94a3b8;line-height:1.4}
.retrieval-hit{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;margin-bottom:4px;background:#1e293b;border-radius:6px;border-left:3px solid #2563eb}
.retrieval-hit .hit-rank{font-size:11px;color:#60a5fa;font-weight:600;min-width:18px}
.retrieval-hit .hit-body{flex:1;min-width:0}
.retrieval-hit .hit-source{font-size:9px;color:#475569;margin-bottom:1px}
.retrieval-hit .hit-text{font-size:11px;color:#94a3b8;line-height:1.4}
.retrieval-hit .hit-sim{font-size:10px;color:#22c55e;margin-top:2px}
.trace-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #334155;background:transparent;color:#60a5fa;cursor:pointer;margin-top:6px}
.trace-btn:hover{background:#1e293b}
.trace-btn:disabled{opacity:.5;cursor:wait}
</style>
</head>
<body>
<div class="app">
<header>
<h1>Agent Platform</h1>
<div style="display:flex;align-items:center;gap:12px">
<div class="status"><span class="status-dot" id="statusDot"></span><span id="statusText">checking</span></div>
<span class="badge" id="docCount">-- docs</span>
</div>
</header>
<div class="mode-tabs">
<button class="mode-tab active" data-mode="rag">RAG 知识库问答</button>
<button class="mode-tab" data-mode="agent">Agent 工具调用</button>
</div>
<div id="uploadZone" class="upload-zone">
<div class="icon">📁</div>
<p>拖拽文件到此处或 <strong>点击上传</strong></p>
<p class="hint">支持：PDF · Word · Markdown · TXT · HTML</p>
</div>
<div id="uploadToast" class="upload-toast"></div>
<div class="chat-area" id="chatArea">
<div class="empty-state">
<h2>Agent Platform</h2>
<p>RAG 知识库问答 + LangGraph Agent 工具调用</p>
<p style="margin-top:8px;font-size:12px">试试: 什么是 RAG？ | 现在几点？ | 计算 15*7+3</p>
</div>
</div>
<div class="input-bar">
<input type="text" id="questionInput" placeholder="输入问题..." autofocus>
<button class="btn-rag" id="sendBtn">发送</button>
</div>
</div>
<script>
var API="http://localhost:8000/api/v1";
var mode="rag";
var sessionId="web-"+Date.now();
document.querySelectorAll(".mode-tab").forEach(function(t){
t.addEventListener("click",function(){
document.querySelectorAll(".mode-tab").forEach(function(x){x.classList.remove("active")});
t.classList.add("active");
mode=t.dataset.mode;
var b=document.getElementById("sendBtn");
b.className=mode==="rag"?"btn-rag":"btn-agent";
b.textContent=mode==="rag"?"RAG 问答":"Agent 执行";
document.getElementById("questionInput").placeholder=mode==="rag"?"输入知识库问题...":"输入任务: 计算 15*7+3...";
})});
// ── File Upload ──
var uploadZone=document.getElementById("uploadZone");
var uploadToast=document.getElementById("uploadToast");
var fileInput=document.createElement("input");
fileInput.type="file";
fileInput.accept=".pdf,.docx,.doc,.md,.txt,.html,.htm";
fileInput.style.display="none";
document.body.appendChild(fileInput);

function showToast(msg,type){
uploadToast.textContent=msg;
uploadToast.className="upload-toast "+type;
if(type!="loading"){setTimeout(function(){uploadToast.className="upload-toast"},4000)}
}

uploadZone.addEventListener("click",function(){fileInput.click()});
fileInput.addEventListener("change",function(){
if(fileInput.files.length)uploadFile(fileInput.files[0]);
fileInput.value="";
});

uploadZone.addEventListener("dragover",function(e){e.preventDefault();uploadZone.classList.add("dragover")});
uploadZone.addEventListener("dragleave",function(e){e.preventDefault();uploadZone.classList.remove("dragover")});
uploadZone.addEventListener("drop",function(e){
e.preventDefault();
uploadZone.classList.remove("dragover");
if(e.dataTransfer.files.length)uploadFile(e.dataTransfer.files[0]);
});

function uploadFile(file){
var fd=new FormData();
fd.append("file",file);
showToast("正在上传并解析: "+file.name+"...","loading");
fetch(API+"/documents/upload-file",{method:"POST",body:fd}).then(function(r){
if(!r.ok)return r.json().then(function(d){throw new Error(d.detail||"upload failed")});
return r.json()
}).then(function(d){
showToast("上传成功！"+d.message+"，处理了 "+d.chunks_processed+" 个分块","success");
checkHealth();
renderImportPipeline(d);
}).catch(function(e){
showToast("上传失败: "+e.message,"error");
});
}

function checkHealth(){
fetch(API+"/health").then(function(r){return r.json()}).then(function(d){
document.getElementById("statusDot").style.background="#22c55e";
document.getElementById("statusText").textContent="v"+d.version;
}).catch(function(){
document.getElementById("statusDot").style.background="#ef4444";
document.getElementById("statusText").textContent="offline";
});
fetch(API+"/documents/count").then(function(r){return r.json()}).then(function(d){
document.getElementById("docCount").textContent=d.count+" docs";
}).catch(function(){});
}
checkHealth();
setInterval(checkHealth,30000);
function addMessage(role,content){
var a=document.getElementById("chatArea");
var e=a.querySelector(".empty-state");
if(e)e.remove();
var d=document.createElement("div");
d.className="message "+role;
d.textContent=content;
a.appendChild(d);
a.scrollTop=a.scrollHeight;
return d;
}
function addThinking(){
var a=document.getElementById("chatArea");
var e=a.querySelector(".empty-state");
if(e)e.remove();
var d=document.createElement("div");
d.className="thinking";
d.textContent="thinking...";
d.id="thinkingMsg";
a.appendChild(d);
a.scrollTop=a.scrollHeight;
}
function removeThinking(){
var t=document.getElementById("thinkingMsg");
if(t)t.remove();
}
// ── Pipeline Visualization ──
function renderImportPipeline(d){
var a=document.getElementById("chatArea");
var e=a.querySelector(".empty-state");if(e)e.remove();
var wrap=document.createElement("div");wrap.className="pipeline";
var steps=[
{icon:"📄",title:"文件上传",value:d.file_count+" 个文件",sub:(d.total_chars||0)+" 字符"},
{icon:"🔪",title:"文本分块",value:d.chunks_processed+" 个分块",sub:"chunk_size=500"},
{icon:"🧮",title:"Embedding",value:"向量化",sub:"bge-small-zh-v1.5"},
{icon:"💾",title:"向量存储",value:"ChromaDB",sub:"已持久化"},
];
var body='<div class="pipeline-steps">';
steps.forEach(function(s,i){
body+='<div class="pipeline-step"><div class="step-icon">'+s.icon+'</div><div class="step-title">'+s.title+'</div><div class="step-value">'+s.value+'</div><div class="step-sub">'+s.sub+'</div></div>';
if(i<steps.length-1)body+='<div class="pipeline-arrow">→</div>';
});
body+='</div>';
if(d.chunk_previews&&d.chunk_previews.length){
body+='<div class="chunk-list">';
d.chunk_previews.forEach(function(c){
body+='<div class="chunk-item"><div class="chunk-idx">Chunk #'+c.index+' ('+c.char_count+' chars)</div><div class="chunk-text">'+escapeHtml(c.text_preview)+'</div></div>';
});
body+='</div>';
}
wrap.innerHTML='<div class="pipeline-header" onclick="togglePipeline(this)">📊 导入流程可视化 · '+d.chunks_processed+' 分块 · '+ (d.total_chars||0) +' 字符 <span class="arrow">▶</span></div><div class="pipeline-body">'+body+'</div>';
a.appendChild(wrap);
a.scrollTop=a.scrollHeight;
}

function renderQueryPipeline(d){
var a=document.getElementById("chatArea");
var stepsMap={};
d.steps.forEach(function(s){stepsMap[s.step]=s});
var wrap=document.createElement("div");wrap.className="pipeline";

var stepCards=[
{key:"1. 查询向量化",icon:"🔍",title:"查询向量化"},
{key:"2. 向量检索",icon:"🔍",title:"向量检索"},
{key:"3. 上下文组装",icon:"📋",title:"上下文组装"},
{key:"4. LLM生成回答",icon:"🤖",title:"LLM生成"},
];
var body='<div class="pipeline-steps">';
stepCards.forEach(function(sc,i){
var s=stepsMap[sc.key];
var val="",sub="";
if(s){
if(sc.key==="1. 查询向量化"){val=s.output.dimension+" 维";sub="BGE embedding"}
else if(sc.key==="2. 向量检索"){val=s.output.hits_count+" 条命中";sub="top_k=5"}
else if(sc.key==="3. 上下文组装"){val=s.output.context_chars+" chars";sub=s.output.sources.length+" 个来源"}
else if(sc.key==="4. LLM生成回答"){val=s.output.answer_len+" chars";sub=(s.output.gen_ms/1000).toFixed(1)+"s"}
}
body+='<div class="pipeline-step"><div class="step-icon">'+sc.icon+'</div><div class="step-title">'+sc.title+'</div><div class="step-value">'+(val||"-")+'</div><div class="step-sub">'+(sub||"")+'</div></div>';
if(i<stepCards.length-1)body+='<div class="pipeline-arrow">→</div>';
});
body+='</div>';

var retStep=stepsMap["2. 向量检索"];
if(retStep&&retStep.output.results){
body+='<div style="margin-top:10px;font-size:12px;color:#94a3b8">检索结果 (Top-K)：</div>';
retStep.output.results.forEach(function(r){
body+='<div class="retrieval-hit"><div class="hit-rank">#'+r.rank+'</div><div class="hit-body"><div class="hit-source">'+escapeHtml(r.source)+'</div><div class="hit-text">'+escapeHtml(r.text_preview)+'</div><div class="hit-sim">相似度: '+r.similarity+'</div></div></div>';
});
}

var ctxStep=stepsMap["3. 上下文组装"];
if(ctxStep){
body+='<div class="chunk-item" style="margin-top:8px"><div class="chunk-idx">组装后的 Prompt 上下文 ('+ctxStep.output.est_tokens+' est. tokens)</div><div class="chunk-text">'+escapeHtml(ctxStep.output.context_preview)+'</div></div>';
}

var totalMs=d.total_duration_ms?((d.total_duration_ms/1000).toFixed(1)+'s'):'';
wrap.innerHTML='<div class="pipeline-header" onclick="togglePipeline(this)">🔍 检索流程可视化'+(totalMs?' · '+totalMs:'')+' <span class="arrow">▶</span></div><div class="pipeline-body">'+body+'</div>';
a.appendChild(wrap);
a.scrollTop=a.scrollHeight;
}

function togglePipeline(hdr){
hdr.classList.toggle("open");
hdr.nextElementSibling.classList.toggle("show");
}

function escapeHtml(t){var d=document.createElement("div");d.textContent=t;return d.innerHTML}

function fetchQueryTrace(btn,question,sessionId){
btn.disabled=true;btn.textContent="加载中...";
fetch(API+"/rag/trace-query",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:question,session_id:sessionId})}).then(function(r){return r.json()}).then(function(d){
renderQueryPipeline(d);
btn.remove();
}).catch(function(e){
btn.textContent="加载失败: "+e.message;
btn.disabled=false;
});
}

function sendMessage(){
var i=document.getElementById("questionInput");
var q=i.value.trim();
if(!q)return;
i.value="";
addMessage("user",q);
addThinking();
var b=document.getElementById("sendBtn");
b.disabled=true;
var ep=mode==="rag"?"/rag/ask":"/agent/ask";
fetch(API+ep,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:q,session_id:sessionId})}).then(function(r){return r.json()}).then(function(d){
removeThinking();
var m=addMessage("assistant",d.answer);
if(d.sources&&d.sources.length){var s=document.createElement("div");s.className="sources";s.textContent="Sources: "+d.sources.join(", ");m.appendChild(s)}
if(mode==="rag"){
var tb=document.createElement("button");tb.className="trace-btn";tb.textContent="🔍 查看检索流程";tb.onclick=function(){fetchQueryTrace(tb,q,sessionId)};m.appendChild(tb);
}
if(d.tool_log&&d.tool_log.length){var l=document.createElement("div");l.className="tool-log";l.textContent="Tools: "+d.tool_log.join(" | ");m.appendChild(l)}
}).catch(function(e){
removeThinking();
addMessage("assistant","Request failed: "+e.message);
}).finally(function(){b.disabled=false;i.focus()});
}
document.getElementById("questionInput").addEventListener("keydown",function(e){if(e.key==="Enter")sendMessage()});
</script>
</body>
</html>
